<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data:; manifest-src 'self';">
<meta name="theme-color" content="#14141f">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.svg">
<title>pixel office</title>
<style>
  :root { --bg:#14141f; --floor:#191926; --room:#1e1e2e; --ink:#cdd6f4; --dim:#6c7086; --line:#2a2a3c;
          --working:#a6e3a1; --waiting:#f9e2af; --blocked:#f38ba8; --done:#89b4fa; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { font-family:ui-monospace,Menlo,Consolas,monospace; background:var(--bg); color:var(--ink);
         display:flex; flex-direction:column; overflow:hidden; }
  header { padding:12px 18px; border-bottom:1px solid var(--line); display:flex; gap:16px;
           align-items:baseline; flex:0 0 auto; }
  h1 { font-size:14px; margin:0; letter-spacing:1px; }
  #conn { font-size:11px; color:var(--dim); }
  #legend { margin-left:auto; font-size:10px; color:var(--dim); display:flex; gap:12px; }
  #legend b { font-weight:normal; }
  .k-working{color:var(--working)} .k-waiting{color:var(--waiting)}
  .k-blocked{color:var(--blocked)} .k-done{color:var(--done)}
  #floor { position:relative; flex:1 1 auto; padding:16px; display:grid; gap:14px; overflow:auto;
           grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); background:
           repeating-linear-gradient(0deg,var(--floor),var(--floor) 23px,#1b1b28 23px,#1b1b28 24px)
           ,repeating-linear-gradient(90deg,var(--floor),var(--floor) 23px,#1b1b28 23px,#1b1b28 24px); }
  .room { background:var(--room); border:2px solid var(--line); border-radius:6px; padding:10px;
          box-shadow:3px 3px 0 #0006; min-height:120px; display:flex; flex-direction:column; }
  .room > .title { font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--dim);
                   margin-bottom:8px; display:flex; justify-content:space-between; }
  .desks { display:flex; flex-wrap:wrap; gap:10px 12px; align-content:flex-start; }
  .avatar { position:relative; width:56px; text-align:center; transition:transform .45s ease,
            opacity .3s; image-rendering:pixelated; }
  .face { font-size:30px; line-height:1; }
  .name { font-size:9px; color:var(--dim); margin-top:2px; overflow:hidden; text-overflow:ellipsis;
          white-space:nowrap; }
  .ring { height:3px; border-radius:2px; margin-top:3px; background:var(--dim); }
  .working .ring{background:var(--working)} .waiting .ring{background:var(--waiting)}
  .blocked .ring{background:var(--blocked)} .done .ring{background:var(--done)}
  .stale, .disconnected { opacity:.4; }
  .stale .face, .disconnected .face { filter:grayscale(1); }
  .bubble { position:absolute; bottom:100%; left:50%; transform:translateX(-50%);
            background:#313244; color:var(--ink); font-size:9px; padding:2px 6px; border-radius:4px;
            white-space:nowrap; margin-bottom:4px; opacity:0; transition:opacity .3s; pointer-events:none;
            max-width:120px; overflow:hidden; text-overflow:ellipsis; }
  .avatar.say .bubble { opacity:1; }
  #empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
           color:var(--dim); font-size:12px; }
  #more { grid-column:1/-1; color:var(--dim); font-size:11px; text-align:center; padding:8px; }
  #banner { display:none; background:#f9e2af22; color:#f9e2af; font-size:11px; padding:6px 18px;
            border-bottom:1px solid #f9e2af44; }
  #banner.show { display:block; }
  .avatar { cursor:pointer; }
  #sheet { position:fixed; right:0; top:0; bottom:0; width:min(320px,86vw); background:#1e1e2e;
           border-left:2px solid var(--line); box-shadow:-4px 0 20px #0008; transform:translateX(100%);
           transition:transform .25s ease; padding:18px; z-index:10; overflow:auto; }
  #sheet.open { transform:translateX(0); }
  #sheet h2 { font-size:13px; margin:0 0 12px; letter-spacing:1px; }
  #sheet dl { display:grid; grid-template-columns:auto 1fr; gap:6px 12px; font-size:12px; margin:0; }
  #sheet dt { color:var(--dim); } #sheet dd { margin:0; word-break:break-all; }
  #sheet .close { position:absolute; top:12px; right:14px; color:var(--dim); cursor:pointer;
                  background:none; border:none; font-size:16px; }
  #sheet .readonly { margin-top:16px; font-size:10px; color:var(--dim); }
  /* mobile: single-column rooms, larger touch targets, read-only monitor */
  @media (max-width:600px){
    #floor { grid-template-columns:1fr; padding:10px; gap:10px; }
    #legend { display:none; }
    .avatar { width:64px; }
    .face { font-size:34px; }
    header { padding:10px 14px; }
  }
  @media (prefers-reduced-motion: reduce){ .avatar{transition:none} }
  @media (prefers-reduced-motion: no-preference){
    .working:not(.stale):not(.disconnected) .face{ animation:bob 1.3s ease-in-out infinite; }
    .waiting .face{ animation:wave 1.1s ease-in-out infinite; }
    @keyframes bob{50%{transform:translateY(-3px)}}
    @keyframes wave{50%{transform:rotate(-12deg)}}
  }
</style>
</head>
<body>
<header>
  <h1>PIXEL OFFICE</h1><span id="conn">connecting…</span>
  <div id="legend">
    <b class="k-working">● focus</b><b class="k-waiting">● needs you</b>
    <b class="k-blocked">● blocked</b><b class="k-done">● wrapped</b>
  </div>
</header>
<div id="banner"></div>
<div id="floor"><div id="empty">no agents yet — run a CLI (claude / codex / grok) and watch.</div></div>
<aside id="sheet" hidden>
  <button class="close" id="sheetClose" aria-label="close">✕</button>
  <h2 id="sheetTitle"></h2>
  <dl id="sheetBody"></dl>
  <div class="readonly">read-only monitor — actions are gated by the control plane, not this view.</div>
</aside>
<script>
"use strict";
const banner = document.getElementById("banner");
function setBanner(msg){ if(msg){banner.textContent=msg;banner.classList.add("show");}
                        else banner.classList.remove("show"); }
// PWA: cache the last snapshot so reopening (even offline) shows last-known state
function saveSnapshot(list){ try{ localStorage.setItem("po:last", JSON.stringify(list)); }catch(e){} }
function loadSnapshot(){ try{ return JSON.parse(localStorage.getItem("po:last")||"[]"); }catch(e){ return []; } }
const FACES = { working:"🧑‍💻", waiting:"🙋", blocked:"🆘", done:"😌" };
const MAX_RENDER = 80;                         // LOD: cap DOM avatars on weak devices
const rows = new Map();
const floor = document.getElementById("floor");
const conn = document.getElementById("conn");

function key(r){ return [r.host_id,r.cli,r.session_id,r.agent_id].join("|"); }
function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.textContent; }

function render(){
  if (document.hidden) return;                 // pause rendering when tab hidden
  const all = [...rows.values()];
  // ROOMS = one per cli (the "team bullpen"); avatars sit at desks and glide
  // between rooms when their cli-room changes; ring + face show live state.
  const byRoom = new Map();
  for (const r of all){ (byRoom.get(r.cli) || byRoom.set(r.cli,[]).get(r.cli)).push(r); }
  floor.textContent = "";
  if (!all.length){ const e=document.createElement("div"); e.id="empty";
    e.textContent="no agents yet — run a CLI (claude / codex / grok) and watch."; floor.append(e); return; }

  let rendered = 0, hidden = 0;
  for (const [cli, agents] of [...byRoom].sort()){
    agents.sort((a,b)=>key(a)<key(b)?-1:1);
    const room = document.createElement("div"); room.className="room";
    const title = document.createElement("div"); title.className="title";
    const busy = agents.filter(a=>a.activity==="working"||a.activity==="waiting").length;
    title.innerHTML = ""; title.append(document.createTextNode(esc(cli)));
    const count = document.createElement("span"); count.textContent = `${busy}/${agents.length} active`;
    title.append(count); room.append(title);
    const desks = document.createElement("div"); desks.className="desks";
    for (const r of agents){
      if (rendered >= MAX_RENDER){ hidden++; continue; }
      rendered++;
      const av = document.createElement("div");
      // show a speech bubble for the states a human should notice
      const say = (r.activity === "waiting" || r.activity === "blocked") ? " say" : "";
      av.className = `avatar ${r.activity} ${r.liveness}${say}`;
      av.tabIndex = 0; av.setAttribute("role", "button");
      av.addEventListener("click", () => openSheet(r));
      av.addEventListener("keydown", (e) => { if (e.key === "Enter") openSheet(r); });
      const bubble = document.createElement("div"); bubble.className="bubble";
      bubble.textContent = r.speech || r.activity;
      const face = document.createElement("div"); face.className="face";
      face.textContent = FACES[r.activity] || "🤖";
      const name = document.createElement("div"); name.className="name";
      name.textContent = r.agent_id === "main" ? r.session_id.slice(0,8) : esc(r.agent_id);
      const ring = document.createElement("div"); ring.className="ring";
      av.append(bubble, face, name, ring);
      desks.append(av);
    }
    room.append(desks); floor.append(room);
  }
  if (hidden){ const m=document.createElement("div"); m.id="more";
    m.textContent = `+${hidden} more agents (raise MAX_RENDER to show)`; floor.append(m); }
}
document.addEventListener("visibilitychange", render);

// detail sheet (read-only) — Phase 7 "detail sheets instead of tabs"
const sheet = document.getElementById("sheet");
const sheetTitle = document.getElementById("sheetTitle");
const sheetBody = document.getElementById("sheetBody");
function openSheet(r){
  sheetTitle.textContent = `${r.cli} · ${r.agent_id}`;
  sheetBody.textContent = "";
  const fields = [["activity", r.activity], ["liveness", r.liveness], ["session", r.session_id],
                  ["parent", r.parent_agent_id || "—"], ["source", r.last_source],
                  ["last seen", r.last_ts]];
  for (const [k, v] of fields){
    const dt = document.createElement("dt"); dt.textContent = k;
    const dd = document.createElement("dd"); dd.textContent = v;   // textContent — no injection
    sheetBody.append(dt, dd);
  }
  sheet.hidden = false; requestAnimationFrame(() => sheet.classList.add("open"));
}
function closeSheet(){ sheet.classList.remove("open"); setTimeout(() => { sheet.hidden = true; }, 250); }
document.getElementById("sheetClose").addEventListener("click", closeSheet);
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSheet(); });

function bubbleFor(r){ return r.activity==="waiting" ? "needs you"
                     : r.activity==="done" ? "wrapped up"
                     : r.activity==="blocked" ? "blocked" : "working"; }

// paint last-known state immediately (offline / before ws connects)
for (const r of loadSnapshot()){ r.speech = bubbleFor(r); rows.set(key(r), r); }
if (rows.size){ setBanner("showing last-known state — connecting for live…"); render(); }

let retry = 500;
function connect(){
  const ws = new WebSocket(`${location.protocol==="https:"?"wss":"ws"}://${location.host}/ws/office`);
  ws.onopen = () => { conn.textContent="live"; retry=500; setBanner(""); };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "snapshot") rows.clear();
    for (const r of msg.rows){ r.speech = bubbleFor(r); rows.set(key(r), r); }
    saveSnapshot([...rows.values()]);
    render();
  };
  ws.onclose = () => { conn.textContent="offline";
                       setBanner("offline — showing last-known state. reopen when your office is reachable.");
                       setTimeout(connect, retry); retry = Math.min(retry*2, 10000); };
}
connect();
if ("serviceWorker" in navigator){ navigator.serviceWorker.register("/sw.js").catch(()=>{}); }
</script>
</body>
</html>
